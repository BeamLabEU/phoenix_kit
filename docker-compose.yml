services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: phoenix_kit_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      MIX_ENV: dev
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    volumes:
      - mix_deps:/app/deps
      - mix_build:/app/_build
      - mix_hex:/root/.mix
      - hex_cache:/root/.hex
    ports:
      - "4000:4000"
    command: mix phx.server
    stdin_open: true
    tty: true

  db:
    image: postgres:16
    container_name: phoenix_kit_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phoenix_kit_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  mix_deps:
  mix_build:
  mix_hex:
  hex_cache:
